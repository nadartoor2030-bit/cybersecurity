<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Hub | Smart Link Checker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- Unified CSS -->
    <link rel="stylesheet" href="link-checker.css">
</head>
<body>

    <!-- ===========================
         LOADING SCREEN OVERLAY
    ============================ -->
    <div id="loader">
        <div class="matrix"></div>
        <div class="loader-box">
            <div class="rings">
                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>
            </div>
            <div class="shield">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1>CYBER HUB</h1>
            <p id="loadingText">Initializing Firewall...</p>
            <div class="progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- ===========================
         SMART LINK CHECKER APP
    ============================ -->
    <div class="background">
        <div class="grid"></div>
        <div class="glow glow1"></div>
        <div class="glow glow2"></div>
    </div>

    <header>
        <h1><i class="fa-solid fa-shield-halved"></i> Cyber Hub</h1>
        <p>AI Powered Phishing Link Analyzer</p>
    </header>

    <section class="container">
        <div class="card">
            <h2>Check Website Safety</h2>
            <p class="subtitle">Paste any website URL below and Cyber Hub will analyze common phishing indicators.</p>
            
            <input type="text" id="urlInput" placeholder="https://example.com">
            
            <!-- FIXED: Added explicit onclick handler to link directly to your JS function -->
            <button id="scanBtn" onclick="startUrlScan()">
                <i class="fa-solid fa-magnifying-glass"></i> Scan Link
            </button>
            
            <div class="scanner">
                <div class="scanner-line" id="scannerLine"></div>
            </div>

            <div class="riskBox">
                <div class="riskHeader">
                    <h3>Security Score</h3>
                    <span id="riskPercent">0%</span>
                </div>
                <div class="riskBar">
                    <div id="riskProgress"></div>
                </div>
            </div>

            <div id="resultCard">
                <h2 id="resultTitle">Waiting...</h2>
                <p id="resultText">Enter a website to begin scanning.</p>
            </div>

            <div class="analysis">
                <h3>Analysis Report</h3>
                <ul id="reasonList">
                    <li>No scan yet.</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="link-checker.js"></script>
</body>
</html>
